id: "14"
identifier: "ISSUE-14"
title: "Build a coin change calculator"
description: |
  Create a Python script called coin_change.py that:

  1. Accepts a target amount in cents as the first argument
  2. Uses dynamic programming to find the minimum number of coins
     needed to make that amount using US coins: 1, 5, 10, 25, 50, 100 cents
  3. Prints the minimum coin count and the breakdown (e.g. 2 quarters, 1 dime)
  4. Also prints all possible ways to make the amount using the fewest coins
     if there are multiple combinations with the same count

  Run it against these amounts and save all output to results.txt:
    python coin_change.py 41
    python coin_change.py 99
    python coin_change.py 0
    python coin_change.py 200

  Before marking Done, verify with bash:
  - coin_change.py exists and is non-empty (wc -c coin_change.py)
  - results.txt exists and is non-empty (wc -c results.txt)
  - python coin_change.py 41 runs without errors

  Only mark Done after all checks pass.
state: "Done"
