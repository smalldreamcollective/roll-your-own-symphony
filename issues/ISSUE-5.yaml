id: "5"
identifier: "ISSUE-5"
title: "Build a small HTTP server with routing"
description: |
  Create a Python file called server.py that implements a minimal HTTP server
  (using only the standard library — no Flask, FastAPI, etc.) with the following routes:

  GET /         → returns {"status": "ok"} as JSON
  GET /echo     → returns {"message": <value of ?msg= query param>} as JSON
  GET /reverse  → returns {"result": <value of ?text= query param, reversed>} as JSON
  GET /stats    → returns {"requests": <total request count since startup>} as JSON

  Requirements:
  - All responses must set Content-Type: application/json
  - Unknown routes return 404 with {"error": "not found"}
  - The server listens on port 8765

  Also write a test script called test_server.py that:
  - Starts server.py as a subprocess
  - Sends requests to each route (including edge cases like missing params)
  - Prints PASS or FAIL for each test case
  - Kills the server when done

  Run test_server.py and capture the output in test_results.txt.
  All tests must pass.
state: "Done"
priority: 1
