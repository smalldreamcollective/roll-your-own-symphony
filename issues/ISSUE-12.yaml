id: "12"
identifier: "ISSUE-12"
title: "Build a simple task queue simulator"
description: |
  Create a Python script called task_queue.py that simulates a task queue:

  1. Define a TaskQueue class with these methods:
     - enqueue(task_name, priority=0): add a task (higher priority runs first)
     - process(): pop and return the highest-priority task
     - peek(): return the next task without removing it
     - size(): return number of pending tasks
     - is_empty(): return True if no tasks

  2. Write a simulation that:
     - Enqueues 10 tasks with varying priorities and names
     - Processes them one at a time, printing each task as it runs
     - Shows the queue size before and after processing

  3. Also write a function called batch_process(queue, n) that processes
     up to n tasks and returns a list of completed task names.

  Create a file called demo.py that imports TaskQueue and runs a demo
  showing all features. Save the demo output to demo_output.txt.

  Before marking Done, verify with bash:
  - task_queue.py exists and is non-empty (wc -c task_queue.py)
  - demo.py exists and is non-empty (wc -c demo.py)
  - demo_output.txt exists and is non-empty (wc -c demo_output.txt)
  - python demo.py runs without errors

  Only mark Done after all checks pass.
state: "Done"
